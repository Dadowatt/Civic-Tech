<!-- Container -->
@if (incident) {
  <div class="container mt-4" style="background-color: white;">

  <div class="card shadow border-0">

    <!-- Image -->
      <img
  [src]="incident.image || 'https://picsum.photos/1200/500'" class="card-img-top incident-detail-image" alt="incident">

    <div class="card-body p-4">

      <!-- Catégorie -->
      <span class="badge bg-secondary mb-3">
        {{ incident.categorie }}
      </span>

      <!-- Titre -->
      <h2 class="fw-bold mb-3">
        {{ incident.titre }}
      </h2>

      <!-- Description -->
      <p class="text-muted fs-5">
        {{ incident.description }}
      </p>

      <hr>

      <!-- Informations -->
      <div class="row mt-4">

        <div class="col-md-6 mb-3">
          <p class="mb-0">
            <i class="bi bi-geo-alt-fill text-primary"></i>
            <strong> Localisation :</strong>
          </p>
          <p>{{ incident.localisation }}</p>
        </div>

        <div class="col-md-6 mb-3">
          <p class="mb-0">
            <i class="bi bi-calendar-event-fill text-primary"></i>
            <strong> Date :</strong>
          </p>
          <p>{{ incident.date | date:'dd/MM/yyyy' }}</p>
        </div>

      </div>

    </div>

    <!-- Footer -->
    <div class="card-footer bg-white d-flex justify-content-between align-items-center p-3">

      <span class="fw-bold text-primary">
         {{ incident.supports }} soutiens
      </span>

      <div class="d-flex gap-2">

        <button
          class="btn btn-outline-secondary"
          (click)="goBack()">
          <i class="bi bi-arrow-left"></i>
          Retour
        </button>

        <button
          class="btn btn-primary"
          (click)="supportIncident()">
          <i class="bi bi-hand-thumbs-up-fill"></i>
          Soutenir
        </button>

      </div>

    </div>

  </div>

</div>
}

@if (erreur) {
  <div class="container mt-5 text-center">
    <div class="alert alert-danger">
      Incident introuvable.
    </div>
  </div>
}
