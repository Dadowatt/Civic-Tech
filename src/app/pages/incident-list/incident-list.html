<div class="container py-4">
  <div class="mb-4">
    <h3 class="fw-bold mb-1">Incidents récents</h3>
    <p class="text-muted">Consultez et suivez les signalements de votre quartier</p>
  </div>

  <!-- les Stats -->
  <div class="row mb-4 text-center g-3">
    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-3">
      <!-- afficher le nombre total d'incidents -->
        <h4 class="fw-bold">{{ totalIncidents }}</h4>
        <small>Total incidents</small>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-3">
        <h4 class="fw-bold text-warning">{{ totalCategories }}</h4>
        <small>Total catégories</small>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-3">
        <h4 class="fw-bold text-success">{{ totalSupports }}</h4>
        <small>Total soutiens</small>
      </div>
    </div>
  </div>

  <!-- les filtres par catégorie pour afficher les incidents concernés -->
 <div class="d-flex gap-2 mb-4 mt-4 flex-wrap">
    <button class="btn btn-dark btn-sm rounded-pill px-4" (click)="searchIncidents('Tous')">Tous</button>
    <button class="btn btn-outline-secondary btn-sm  rounded-pill px-3" (click)="searchIncidents('Voirie')">Voirie</button>
    <button class="btn btn-outline-secondary btn-sm  rounded-pill px-3" (click)="searchIncidents('Électricité')">Électricité</button>
    <button class="btn btn-outline-secondary btn-sm  rounded-pill px-3" (click)="searchIncidents('Sécurité')">Sécurité</button>
    <button class="btn btn-outline-secondary btn-sm  rounded-pill px-3" (click)="searchIncidents('Assainissement')">Assainissement</button>
    <button class="btn btn-outline-secondary btn-sm  rounded-pill px-3" (click)="searchIncidents('Autre')">Autre</button>
  </div>

  <!-- grid des incidents -->
  <div class="row g-4">
  @for (incident of filteredIncidents; track incident.id) {
    <div class="col-md-6 col-lg-4">
      <app-incident-card
        [incident]="incident">
      </app-incident-card>
    </div>
  }
</div>
</div>
