<app-navbar></app-navbar>

<div class="container py-4">
  <div class="mb-4">
    <h3 class="fw-bold mb-1">Incidents récents</h3>
    <p class="text-muted">Consultez et suivez les signalements de votre quartier</p>
  </div>

  <!-- les Stats -->
  <div class="row mb-4 text-center g-3">
    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-3">
        <h4 class="fw-bold">12</h4>
        <small>Total incidents</small>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-3">
        <h4 class="fw-bold text-warning">5</h4>
        <small>En cours</small>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-3">
        <h4 class="fw-bold text-success">7</h4>
        <small>Résolus</small>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2 mb-4 flex-wrap">
    <button class="btn btn-dark btn-sm">Tous</button>
    <button class="btn btn-outline-secondary btn-sm">Voirie</button>
    <button class="btn btn-outline-secondary btn-sm">Électricité</button>
    <button class="btn btn-outline-secondary btn-sm">Sécurité</button>
    <button class="btn btn-outline-secondary btn-sm">Assainissement</button>
  </div>

  <!-- grid des incidents -->
  <div class="row g-4">
    @for (incident of incidents; track incident.id){
        <div class="col-md-6 col-lg-4">
        <app-incident-card
            [incident]="incident"></app-incident-card>
        </div>
    }

  </div>

</div>
